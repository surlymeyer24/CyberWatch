name: Build and Release CyberWatch.Service

on:
  push:
    tags:
      - 'v*.*.*'

jobs:
  build-and-release:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # ── Extraer versión del tag (v1.2.3 → 1.2.3) ──────────────────────────
      - name: Extract version
        id: version
        shell: bash
        run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      # ── Actualizar versión en appsettings.json antes de compilar ───────────
      - name: Patch appsettings version
        shell: pwsh
        run: |
          $file = "CyberWatch.Service/appsettings.json"
          $json = Get-Content $file -Raw | ConvertFrom-Json
          $json.CyberWatch.Version = "${{ steps.version.outputs.version }}"
          $json | ConvertTo-Json -Depth 10 | Set-Content $file -Encoding UTF8

      # ── Build .NET 8 (self-contained, win-x64) ─────────────────────────────
      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Publish
        run: >
          dotnet publish CyberWatch.Service/CyberWatch.Service.csproj
          -c Release
          -r win-x64
          --self-contained true
          -o publish_output

      # ── Empaquetar como CyberWatch.Service.zip ─────────────────────────────
      - name: Zip release
        shell: pwsh
        run: Compress-Archive -Path publish_output\* -DestinationPath CyberWatch.Service.zip

      # ── Crear GitHub Release y subir el ZIP ────────────────────────────────
      - name: Upload to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: CyberWatch Service ${{ github.ref_name }}
          files: CyberWatch.Service.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # ── Actualizar Firestore: config/ciberseguridad → version + url ────────
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install firebase-admin
        run: npm install firebase-admin

      - name: Update Firestore release URL
        shell: bash
        env:
          FIREBASE_SERVICE_ACCOUNT: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
          TAG: ${{ github.ref_name }}
          VERSION: ${{ steps.version.outputs.version }}
        run: |
          node -e "
          const admin = require('firebase-admin');
          const sa = JSON.parse(process.env.FIREBASE_SERVICE_ACCOUNT);
          admin.initializeApp({ credential: admin.credential.cert(sa) });
          const db = admin.firestore();
          const url = \`https://github.com/surlymeyer24/CyberWatch/releases/download/\${process.env.TAG}/CyberWatch.Service.zip\`;
          db.collection('config').doc('ciberseguridad')
            .set({ version: process.env.VERSION, url }, { merge: true })
            .then(() => { console.log('Firestore actualizado:', url); process.exit(0); })
            .catch(e => { console.error(e); process.exit(1); });
          "
